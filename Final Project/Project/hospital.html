<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Predictive HealthCare – Hospital Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Poppins,Arial;
  background:#f2f6ff;
}
header{
  background:#1f4eff;
  color:white;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}
.search-box{
  display:flex;
  justify-content:center;
  padding:15px;
  background:white;
}
.search-box input{
  width:70%;
  padding:12px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}
.search-box button{
  padding:12px 25px;
  background:#1f4eff;
  color:white;
  border:none;
  border-radius:6px;
  margin-left:10px;
  cursor:pointer;
}
#map{
  width:100%;
  height:300px;
}
.info{
  background:#eaf1ff;
  padding:15px;
  text-align:center;
}
table{
  width:95%;
  margin:20px auto;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
th,td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #ddd;
}
th{
  background:#1f4eff;
  color:white;
}
tr:hover{
  background:#f0f4ff;
}
a{
  color:#1f4eff;
  text-decoration:none;
  font-weight:bold;
}
footer{
  background:#1f4eff;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:20px;
}
</style>
</head>

<body>

<header>🏥 Smart Predictive HealthCare – Hospital Finder</header>

<div class="search-box">
  <input type="text" id="city" placeholder="Enter City (Amravati, Nagpur, Akola)">
  <button onclick="searchCity()">Search</button>
</div>

<div class="info">
  <b>Emergency:</b> 108 | <b>Ambulance:</b> 102 | Click phone number to call hospital
</div>

<iframe id="map" src="https://www.google.com/maps?q=Amravati hospitals&output=embed"></iframe>

<table>
<thead>
<tr>
<th>No</th>
<th>Hospital Name</th>
<th>Address</th>
<th>Contact</th>
</tr>
</thead>
<tbody id="hospitalTable"></tbody>
</table>

<footer>
24×7 Health Support | Smart Predictive HealthCare © 2026
</footer>

<script>
function searchCity(){
 let city=document.getElementById("city").value;
 if(city==="") city="Amravati";

 document.getElementById("map").src="https://www.google.com/maps?q="+city+" hospitals&output=embed";

 let data={
 "amravati":[
 ["Dr. Hedgewar Hospital","VMV Road, Amravati","0721-2567890"],
 ["Irwin Hospital","Civil Lines","0721-2523456"],
 ["Life Care Hospital","Rajapeth","0721-2456789"],
 ["Suyash Hospital","Badnera Road","0721-2487654"],
 ["Aastha Hospital","Shegaon Road","0721-2412345"],
 ["Sanjeevani Hospital","Gadge Nagar","0721-2598765"],
 ["MediCare Hospital","MIDC Area","0721-2609876"]
 ],
 "nagpur":[
 ["Care Hospital","Ramdaspeth","0712-2233445"],
 ["Wockhardt Hospital","Dhantoli","0712-5566778"],
 ["Alexis Hospital","Mankapur","0712-6677889"],
 ["Kingsway Hospital","Kingsway Road","0712-9988776"],
 ["Orange City Hospital","Wardha Road","0712-7788990"],
 ["Apex Hospital","Sitabuldi","0712-8899001"],
 ["Suretech Hospital","Hingna","0712-4455667"]
 ],
 "akola":[
 ["Ozone Hospital","Civil Lines","0724-2233445"],
 ["Akola Critical Care","Tilak Road","0724-3344556"],
 ["Sunrise Hospital","Rautwadi","0724-4455667"],
 ["LifeLine Hospital","Jatharpeth","0724-5566778"],
 ["Medicare Hospital","Shivaji Nagar","0724-6677889"],
 ["City Care Hospital","Ramdas Peth","0724-7788990"],
 ["Aarogyam Hospital","Old City","0724-8899001"]
 ]
 };

 let list=data[city.toLowerCase()] || data["amravati"];
 let table="";

 list.forEach((h,i)=>{
  table+=`<tr>
  <td>${i+1}</td>
  <td>${h[0]}</td>
  <td>${h[1]}</td>
  <td><a href="tel:${h[2]}">${h[2]}</a></td>
  </tr>`;
 });

 document.getElementById("hospitalTable").innerHTML=table;
}

searchCity();
</script>

</body>
</html>
